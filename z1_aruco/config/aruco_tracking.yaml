# =============================================================================
# ArUco Tracking Simulation — Configuration
# =============================================================================
# Edit this file and rebuild (or docker cp) to change simulation behaviour.
# All values are loaded at launch time via ROS parameter server.
# =============================================================================


# -----------------------------------------------------------------------------
# ArUco Marker Detection
# -----------------------------------------------------------------------------
aruco:
  # OpenCV ArUco dictionary to use.
  # Options: DICT_4X4_50, DICT_4X4_100, DICT_5X5_50, DICT_6X6_250, DICT_7X7_1000
  dictionary: DICT_5X5_50

  # List of marker IDs to detect. The arm will track the first one in the list.
  # To track multiple markers, add more IDs — poses published on /aruco/marker_pose_<id>
  marker_ids: [0, 1]

  # Physical size of the printed marker (metres), border included.
  # Must match the model.sdf box dimensions.
  marker_size: 0.05

  # --- Detection tuning (OpenCV ArUco DetectorParameters) ---
  # Minimum marker perimeter as a fraction of the image perimeter (default 0.03).
  # Lower this for small or distant markers. At 0.02, a 50 mm marker is detectable
  # up to ~1.0 m at 640x480 with the D435 69° FOV.
  min_marker_perimeter_rate: 0.02

  # Adaptive thresholding window range (pixels, must be odd).
  # Smaller min/step = crisper thresholding for small markers.
  adaptive_thresh_win_size_min: 3
  adaptive_thresh_win_size_max: 23
  adaptive_thresh_win_size_step: 10

  # Error correction tolerance (0.0–1.0). Higher = more forgiving on blurry markers.
  error_correction_rate: 0.6

  # ID of the marker the arm should follow (must be in marker_ids).
  tracking_id: 1


# -----------------------------------------------------------------------------
# Camera
# -----------------------------------------------------------------------------
camera:
  # Camera mode:
  #   fixed        — static camera at a fixed pose in the world
  #   end_effector — camera attached to the Z1 wrist (link06)
  mode: end_effector

  # Fixed camera pose in world frame [x, y, z, roll, pitch, yaw] (metres / radians)
  # Only used when mode: fixed
  # Default: 1.5m in front of arm, 1.2m high, angled ~25 deg down, facing arm
  fixed_pose: [1.5, 0.0, 1.2, 0.0, 0.436, 3.1415]

  # Offset from link06 (wrist) when mode: end_effector [x, y, z] in metres
  # x = forward along the tool axis (pointing away from wrist)
  end_effector_offset: [0.10, 0.0, 0.0]

  # Camera resolution
  width: 640
  height: 480

  # Camera frame rate (Hz)
  fps: 30

  # Horizontal field of view (radians). D435 spec ~69 deg = 1.2043 rad
  fov: 1.2043

  # Publish a debug image with detected markers overlaid (/aruco/debug_image)
  show_debug_image: true


# -----------------------------------------------------------------------------
# Marker Motion
# -----------------------------------------------------------------------------
marker:
  # Motion pattern for the ArUco marker object in Gazebo.
  # Options: sinusoidal, circular, figure8, square, static
  motion_pattern: square

  # Center position of the motion path in world frame (metres)
  center: [0.70, 0.0, 0.50]

  # Motion amplitude (metres) per axis
  amplitude_y: 0.20    # side-to-side
  amplitude_z: 0.10    # up-down

  # Motion frequency (Hz) — how fast the marker moves
  frequency: 0.2

  # Circular / figure8 radius (metres) — used when motion_pattern is circular or figure8
  radius: 0.20

  # Update rate for marker position commands (Hz)
  update_rate: 50.0

  # If true, marker is affected by Gazebo gravity (falls unless supported)
  gravity: false


# -----------------------------------------------------------------------------
# Arm Tracker
# -----------------------------------------------------------------------------
arm_tracker:
  # Cartesian end-effector speed (m/s). Keep <= 0.5 for safe simulation.
  cartesian_speed: 0.2

  # Proportional gain for direction control: error (m) * gain = direction [-1, 1].
  # gain=3 → full speed at 0.33 m error, slows proportionally as arm approaches target.
  proportional_gain: 2.5

  # Rate at which tracking commands are sent to sim_ctrl (Hz). Max ~50.
  update_rate: 50.0

  # Fixed forward reach (metres, world X) maintained during 2D tracking.
  # The arm only follows the marker's Y (lateral) and Z (vertical) — depth is fixed.
  fixed_x: 0.25

  # Low-pass filter coefficient for the Cartesian target (0.0=frozen, 1.0=instant).
  # Lower values = slower, smoother arm motion. Start at 0.05, raise if too sluggish.
  smoothing_alpha: 0.10

  # Offset applied on top of fixed_x / marker Y,Z before sending to the arm (metres).
  # [x, y, z] — typically zero for 2D tracking
  target_offset: [0.0, 0.0, 0.0]

  # Safe workspace limits for the end-effector (metres, world frame).
  # Commands outside these bounds are clamped.
  workspace:
    x: [0.20, 0.65]
    y: [-0.40, 0.40]
    z: [0.10, 0.75]

  # If false, arm tracker is loaded but does not send commands (useful for testing detection only)
  enabled: true

  # --- Wrist orientation tracking ---
  # When true, wrist joints (4-6) rotate to face the marker once the arm has settled.
  # Position tracking (joints 1-3) is unaffected — the two loops are fully decoupled.
  track_orientation: false

  # Low-pass filter for wrist orientation (same scale as smoothing_alpha).
  # Lower = slower, more stable wrist rotation.
  orientation_alpha: 0.10

  # Position stability gate: wrist control only engages when the arm is settled.
  # stability_threshold — max total position change per tick (metres) to count as stable.
  # stability_ticks     — how many consecutive stable ticks before wrist engages.
  stability_threshold: 0.010  # ~10 mm/tick at 50 Hz
  stability_ticks: 15         # ~0.3 s of stability required


# -----------------------------------------------------------------------------
# Z1 Joint Limits
# -----------------------------------------------------------------------------
# Physical joint range limits for the Unitree Z1 Pro arm (6-DOF, 740 mm reach).
# Values in radians — degree equivalents shown in comments.
joint_limits:
  j1: [-2.618,  2.618]   # ±150 deg  — base rotation
  j2: [ 0.000,  3.142]   #  0–180 deg — shoulder lift
  j3: [-2.880,  0.000]   # -165–0 deg — elbow
  j4: [-1.396,  1.396]   # ±80 deg   — wrist roll
  j5: [-1.484,  1.484]   # ±85 deg   — wrist pitch
  j6: [-2.793,  2.793]   # ±160 deg  — wrist yaw


# -----------------------------------------------------------------------------
# Simulation
# -----------------------------------------------------------------------------
simulation:
  # Start Gazebo paused (press Play in GUI or use /gazebo/unpause_physics service)
  paused: true

  # Show Gazebo GUI window
  gui: true

  # Show Gazebo in headless mode (no rendering, faster — overrides gui: true)
  headless: false
